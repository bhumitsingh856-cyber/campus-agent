version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: campus_bot_db
    environment:
      POSTGRES_DB: ${DB_NAME:-campus_bot}
      POSTGRES_USER: ${DB_USER:-botuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-botpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-botuser} -d ${DB_NAME:-campus_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campus_bot_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campus_bot_app
    environment:
      PGSQL_URL: postgresql+psycopg://botuser:botpassword@postgres:5432/campus_bot
      TELEGRAM_ACCESS_TOKEN: ${TELEGRAM_ACCESS_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - campus_bot_network
    restart: unless-stopped
    # Uncomment for development with auto-reload
    # command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:

networks:
  campus_bot_network:
    driver: bridge
